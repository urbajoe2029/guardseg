<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardseg — Sistema de Controle de Supervisor</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   MÓDULO: TOKENS / DESIGN SYSTEM
═══════════════════════════════════════════ */
:root {
  --bg: #0a0c10;
  --bg2: #0f1218;
  --bg3: #151820;
  --border: #1e2430;
  --border2: #252d3a;
  --accent: #00d4ff;
  --accent2: #0099bb;
  --accent-glow: rgba(0,212,255,0.15);
  --red: #ff3b5c;
  --red-glow: rgba(255,59,92,0.15);
  --green: #00e5a0;
  --yellow: #ffb800;
  --text: #c8d4e0;
  --text2: #6a7c8e;
  --text3: #3d4f5e;
  --sidebar-w: 220px;
  --sidebar-collapsed: 64px;
}

/* ═══════════════════════════════════════════
   MÓDULO: RESET & BASE
═══════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ═══════════════════════════════════════════
   MÓDULO: SIDEBAR
═══════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: width 0.3s ease;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}
.sidebar.collapsed { width: var(--sidebar-collapsed); }

.brand {
  padding: 20px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  overflow: hidden;
  white-space: nowrap;
  min-height: 70px;
}
.brand-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 20px var(--accent-glow);
}
.brand-icon::before { content: '🛡'; font-size: 18px; filter: grayscale(1) brightness(0.1); }
.brand-text { overflow: hidden; }
.brand-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px; font-weight: 700; letter-spacing: 2px;
  color: var(--accent); line-height: 1;
}
.brand-sub { font-size: 9px; letter-spacing: 1.5px; color: var(--text2); text-transform: uppercase; margin-top: 2px; }

.nav { flex: 1; padding: 12px 0; overflow-y: auto; overflow-x: hidden; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px; cursor: pointer; transition: all 0.2s;
  border-left: 2px solid transparent;
  white-space: nowrap; position: relative; overflow: hidden;
}
.nav-item:hover { background: rgba(0,212,255,0.04); border-left-color: var(--border2); }
.nav-item.active { background: var(--accent-glow); border-left-color: var(--accent); }
.nav-item.active .nav-label { color: var(--accent); }
.nav-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; opacity: 0.8; }
.nav-label { font-size: 13px; font-weight: 500; color: var(--text2); transition: color 0.2s; }
.nav-badge {
  margin-left: auto; background: var(--red); color: white;
  font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 10px; flex-shrink: 0;
}

.sidebar-footer {
  padding: 14px 18px; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  overflow: hidden; white-space: nowrap;
}
.avatar {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 12px;
  color: #000; flex-shrink: 0;
}
.user-info { overflow: hidden; flex: 1; }
.user-name { font-size: 12px; font-weight: 600; color: var(--text); }
.user-role { font-size: 10px; color: var(--text2); }

.collapse-btn {
  position: absolute; bottom: 80px; right: -12px;
  width: 24px; height: 24px;
  background: var(--bg3); border: 1px solid var(--border2); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px; color: var(--text2); transition: all 0.2s; z-index: 10;
}
.collapse-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ═══════════════════════════════════════════
   MÓDULO: MAIN / TOPBAR
═══════════════════════════════════════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 70px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.topbar-left { display: flex; flex-direction: column; }
.page-title {
  font-family: 'Rajdhani', sans-serif; font-size: 20px;
  font-weight: 700; letter-spacing: 1px; color: #fff;
}
.page-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 16px; }

.status-dot { display: flex; align-items: center; gap: 6px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--green); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; box-shadow: 0 0 8px var(--green); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.time-display { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text2); letter-spacing: 1px; }

.notif-btn {
  width: 34px; height: 34px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; position: relative; transition: all 0.2s;
}
.notif-btn:hover { border-color: var(--accent); }
.notif-count {
  position: absolute; top: -4px; right: -4px;
  background: var(--red); color: white; font-size: 8px; font-weight: 700;
  width: 14px; height: 14px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* ═══════════════════════════════════════════
   MÓDULO: CONTENT / PAGES
═══════════════════════════════════════════ */
.content { flex: 1; overflow-y: scroll; padding: 24px 28px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-track { background: var(--bg2); }
.content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.content::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

.page { display: none; }
.page.active { display: block; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; color: #fff; }
.section-sub { font-size: 11px; color: var(--text2); }

.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ═══════════════════════════════════════════
   MÓDULO: METRIC CARDS
═══════════════════════════════════════════ */
.metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }

.metric-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; position: relative; overflow: hidden; transition: border-color 0.2s;
}
.metric-card:hover { border-color: var(--border2); }
.metric-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.metric-card.blue::before  { background: var(--accent); }
.metric-card.yellow::before { background: var(--yellow); }
.metric-card.red::before   { background: var(--red); }
.metric-card.green::before { background: var(--green); }

.metric-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.metric-label { font-size: 11px; letter-spacing: 0.5px; color: var(--text2); text-transform: uppercase; font-weight: 500; }
.metric-icon { font-size: 18px; opacity: 0.6; }
.metric-value { font-family: 'Rajdhani', sans-serif; font-size: 38px; font-weight: 700; line-height: 1; color: #fff; }
.metric-sub { font-size: 11px; color: var(--text2); margin-top: 6px; }
.metric-sub span { color: var(--text); }

/* ═══════════════════════════════════════════
   MÓDULO: GRID / PANEL
═══════════════════════════════════════════ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.panel-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; color: #fff; }
.panel-sub { font-size: 10px; color: var(--text2); margin-top: 1px; }
.panel-link { font-size: 11px; color: var(--accent); cursor: pointer; text-decoration: none; }
.panel-body { padding: 16px 18px; }

/* ═══════════════════════════════════════════
   MÓDULO: CHARTS — BAR
═══════════════════════════════════════════ */
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; margin-bottom: 8px; }
.bar-group { flex: 1; display: flex; gap: 2px; align-items: flex-end; }
.bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: opacity 0.2s; cursor: pointer; }
.bar:hover { opacity: 0.8; }
.bar.total { background: var(--accent); opacity: 0.4; }
.bar.resolved { background: var(--green); opacity: 0.7; }
.bar-labels { display: flex; gap: 8px; }
.bar-label { flex: 1; text-align: center; font-size: 9px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }
.legend { display: flex; gap: 14px; margin-top: 8px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text2); }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }

/* ═══════════════════════════════════════════
   MÓDULO: CHARTS — DONUT
═══════════════════════════════════════════ */
.donut-wrap { display: flex; align-items: center; gap: 16px; }
.donut { position: relative; width: 100px; height: 100px; flex-shrink: 0; }
.donut svg { transform: rotate(-90deg); }
.donut-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.donut-label span { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: #fff; display: block; }
.donut-label small { font-size: 9px; color: var(--text2); }
.donut-items { flex: 1; }
.donut-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.donut-row-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.donut-row-label { font-size: 11px; color: var(--text2); flex: 1; }
.donut-row-val { font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); }

/* ═══════════════════════════════════════════
   MÓDULO: OCORRÊNCIAS LIST
═══════════════════════════════════════════ */
.occurrence-item {
  padding: 12px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.occurrence-item:last-child { border-bottom: none; }
.occurrence-item:hover { background: rgba(255,255,255,0.01); margin: 0 -18px; padding: 12px 18px; border-radius: 6px; }
.occ-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.occ-title { font-size: 12px; font-weight: 600; color: var(--text); }
.occ-badge { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 10px; letter-spacing: 0.3px; flex-shrink: 0; }
.badge-resolved { background: rgba(0,229,160,0.12); color: var(--green); }
.badge-open     { background: rgba(255,59,92,0.12);  color: var(--red); }
.badge-pending  { background: rgba(255,184,0,0.12);  color: var(--yellow); }
.badge-progress { background: rgba(0,212,255,0.12);  color: var(--accent); }
.occ-desc { font-size: 11px; color: var(--text2); margin-bottom: 4px; line-height: 1.4; }
.occ-meta { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; }

/* ═══════════════════════════════════════════
   MÓDULO: POSTOS STATUS WIDGET
═══════════════════════════════════════════ */
.post-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
.post-item:last-child { border-bottom: none; }
.post-info { flex: 1; }
.post-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.post-region { font-size: 10px; color: var(--text2); }
.post-coverage { font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600; }
.post-coverage.full    { color: var(--green); }
.post-coverage.partial { color: var(--yellow); }

/* ═══════════════════════════════════════════
   MÓDULO: TYPE BARS
═══════════════════════════════════════════ */
.type-list .type-row { margin-bottom: 10px; }
.type-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.type-name  { font-size: 11px; color: var(--text2); }
.type-count { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--text); }
.type-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.type-fill  { height: 100%; border-radius: 2px; background: var(--accent); }

/* ═══════════════════════════════════════════
   MÓDULO: TABLE
═══════════════════════════════════════════ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2);
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}
td { padding: 10px 12px; font-size: 12px; color: var(--text); border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.01); }
.status-pill { display: inline-block; font-size: 9px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }

/* ═══════════════════════════════════════════
   MÓDULO: RONDAS PAGE
═══════════════════════════════════════════ */
.ronda-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.ronda-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.2s; position: relative;
}
.ronda-card:hover { border-color: var(--border2); }
.ronda-card.done    { border-color: rgba(0,229,160,0.2); }
.ronda-card.pending { border-color: rgba(255,184,0,0.2); }
.ronda-name   { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.ronda-time   { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--text2); }
.ronda-status { font-size: 9px; font-weight: 600; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.ronda-status.done    { color: var(--green); }
.ronda-status.pending { color: var(--yellow); }
.ronda-status.late    { color: var(--red); }

/* ═══════════════════════════════════════════
   MÓDULO: ESCALAS PAGE
═══════════════════════════════════════════ */
.scale-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 20px; }
.scale-day { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 8px; text-align: center; }
.scale-day-name { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 6px; }
.scale-day-num  { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.scale-day.today { border-color: var(--accent); }
.scale-day.today .scale-day-num { color: var(--accent); }
.scale-agents { display: flex; flex-direction: column; gap: 3px; }
.scale-agent  { font-size: 8px; background: rgba(0,212,255,0.08); color: var(--accent); padding: 2px 4px; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ═══════════════════════════════════════════
   MÓDULO: BUTTONS
═══════════════════════════════════════════ */
.btn { padding: 8px 18px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; font-family: 'IBM Plex Sans', sans-serif; }
.btn-ghost   { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); }
.btn-ghost:hover { color: var(--text); }
.btn-primary { background: var(--accent); color: #000; font-weight: 700; }
.btn-primary:hover { background: #00bbdd; }
.btn-sm { padding: 5px 12px; font-size: 11px; border-radius: 6px; cursor: pointer; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-family: 'IBM Plex Sans', sans-serif; transition: all 0.2s; }
.btn-sm:hover { color: var(--accent); border-color: var(--accent); }

/* ═══════════════════════════════════════════
   MÓDULO: MODAL
═══════════════════════════════════════════ */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; width: 460px; max-width: 90vw; padding: 24px; position: relative; }
.modal-title { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.modal-sub   { font-size: 11px; color: var(--text2); margin-bottom: 20px; }
.modal-close { position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: var(--text2); }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); margin-bottom: 6px; }
.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px;
  padding: 8px 12px; font-size: 12px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; outline: none; transition: border-color 0.2s;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: var(--accent); }
.modal-field textarea { resize: vertical; min-height: 80px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* detail grid inside modals */
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.detail-cell { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.detail-cell-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.detail-cell-val   { font-size: 12px; color: var(--text); }

/* ═══════════════════════════════════════════
   MÓDULO: TOAST
═══════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--bg2); border: 1px solid var(--border2); border-left: 3px solid var(--green);
  border-radius: 8px; padding: 12px 16px; font-size: 12px; color: var(--text);
  z-index: 300; transform: translateY(80px); opacity: 0; transition: all 0.3s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4); max-width: 280px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast-title { font-weight: 600; margin-bottom: 2px; color: #fff; }

/* ═══════════════════════════════════════════
   MÓDULO: BOTTOM NAV (mobile)
═══════════════════════════════════════════ */
.bottom-nav { display: none; }
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
  background: var(--bg2); border-top: 1px solid var(--border);
  z-index: 200; align-items: center; justify-content: space-around;
}
.bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 8px; cursor: pointer; border-radius: 8px; transition: all 0.2s; flex: 1; }
.bottom-nav-item .bnav-icon  { font-size: 18px; line-height: 1; }
.bottom-nav-item .bnav-label { font-size: 9px; color: var(--text2); letter-spacing: 0.3px; text-transform: uppercase; }
.bottom-nav-item.active .bnav-label { color: var(--accent); }

/* ═══════════════════════════════════════════
   MÓDULO: RESPONSIVE
═══════════════════════════════════════════ */
@media (max-width: 900px) {
  .sidebar { width: var(--sidebar-collapsed) !important; }

<script>
/* ─────────────────────────────────────────
   MÓDULO: Toast — notificações
───────────────────────────────────────── */
const Toast = (() => {
  let _timer;
  function show(msg, title) {
    const el = document.getElementById('toast');
    document.getElementById('toast-title').textContent = title || '';
    document.getElementById('toast-msg').textContent = msg;
    el.classList.add('show');
    clearTimeout(_timer);
    _timer = setTimeout(() => el.classList.remove('show'), 3000);
  }
  return { show };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MÓDULO: Modal — gestão de modais
───────────────────────────────────────── */
const Modal = (() => {
  function _field(f) {
    if (f.type === 'select') {
      return `<select>${f.options.map(o=>`<option>${o}</option>`).join('')}</select>`;
    }
    if (f.type === 'textarea') {
      return `<textarea placeholder="${f.placeholder||''}"></textarea>`;
    }
    return `<input type="${f.type}" placeholder="${f.placeholder||''}" ${f.value?`value="${f.value}"`:''}/>`;
  }

  function _build(id, cfg) {
    return `
    <div class="modal-overlay" id="modal-${id}" onclick="if(event.target===this)Modal.close('${id}')">
      <div class="modal">
        <div class="modal-close" onclick="Modal.close('${id}')">✕</div>
        <div class="modal-title">${cfg.title}</div>
        <div class="modal-sub">${cfg.sub}</div>
        ${cfg.fields.map(f=>`<div class="modal-field"><label>${f.label}</label>${_field(f)}</div>`).join('')}
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="Modal.close('${id}')">Cancelar</button>
          <button class="btn btn-primary" onclick="Modal.saveClose('${id}','${cfg.successMsg}')">${cfg.btnLabel}</button>
        </div>
      </div>
    </div>`;
  }

  function _buildDetail(id, title, sub, bodyHTML, saveMsg) {
    return `
    <div class="modal-overlay" id="modal-${id}" onclick="if(event.target===this)Modal.close('${id}')">
      <div class="modal">
        <div class="modal-close" onclick="Modal.close('${id}')">✕</div>
        <div class="modal-title">${title}</div>
        <div class="modal-sub">${sub}</div>
        ${bodyHTML}
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="Modal.close('${id}')">Fechar</button>
          <button class="btn btn-primary" onclick="Modal.saveClose('${id}','${saveMsg}')">${saveMsg.includes('Ocorrência')?'Atualizar':'Editar'}</button>
        </div>
      </div>
    </div>`;
  }

  function render() {
    const container = document.getElementById('modals-container');

    // Form modals from DATA
    let html = Object.entries(DATA.modals).map(([id, cfg]) => _build(id, cfg)).join('');

    // Detalhe de ocorrência
    html += _buildDetail('occ-detail', 'Ocorrência #2024', 'Detalhes e acompanhamento', `
      <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:12px;font-weight:600;color:var(--text)">Suspeito — Banco do Brasil</span>
          <span class="occ-badge badge-open">Em andamento</span>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px">Pessoa em atitude suspeita próxima à agência bancária. Monitoramento em andamento. Polícia acionada.</div>
        <div style="font-size:10px;color:var(--text3);font-family:'IBM Plex Mono',monospace">10:05 — Carlos Eduardo Silva</div>
      </div>
      <div class="modal-field"><label>Atualizar Status</label><select><option>Em andamento</option><option>Resolvida</option><option>Encaminhada</option></select></div>
      <div class="modal-field"><label>Observações</label><textarea placeholder="Adicionar observações..."></textarea></div>
    `, 'Ocorrência atualizada!');

    // Detalhe de agente
    html += _buildDetail('agent-detail', 'Marcos Antônio Ferreira', 'GS-0042 · Vigilante', `
      <div class="detail-grid">
        <div class="detail-cell"><div class="detail-cell-label">Posto</div><div class="detail-cell-val">Shopping Pátio Savassi</div></div>
        <div class="detail-cell"><div class="detail-cell-label">Turno</div><div class="detail-cell-val">Diurno</div></div>
        <div class="detail-cell"><div class="detail-cell-label">Status</div><div class="detail-cell-val" style="color:var(--green)">Ativo</div></div>
        <div class="detail-cell"><div class="detail-cell-label">Ocorrências</div><div class="detail-cell-val">3 este mês</div></div>
      </div>
    `, 'Dados atualizados!');

    // Detalhe de posto
    html += _buildDetail('posto-detail', 'Banco do Brasil - Centro', 'Centro-Sul · Cobertura: 2/2', `
      <div class="detail-grid">
        <div class="detail-cell"><div class="detail-cell-label">Status</div><div class="detail-cell-val" style="color:var(--green)">Normal</div></div>
        <div class="detail-cell"><div class="detail-cell-label">Vagas</div><div class="detail-cell-val">2 de 2</div></div>
        <div class="detail-cell"><div class="detail-cell-label">Ocorrências (mês)</div><div class="detail-cell-val">2</div></div>
        <div class="detail-cell"><div class="detail-cell-label">Rondas</div><div class="detail-cell-val">1/dia</div></div>
      </div>
    `, 'Posto atualizado!');

    container.innerHTML = html;
  }

  function open(id)  { document.getElementById('modal-' + id).classList.add('open'); }
  function close(id) { document.getElementById('modal-' + id).classList.remove('open'); }
  function saveClose(id, msg) { close(id); Toast.show('✅ ' + msg, 'Sucesso'); }

  return { render, open, close, saveClose };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MÓDULO: Clock — relógio em tempo real
───────────────────────────────────────── */
const Clock = (() => {
  function tick() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR'); }
  function init() { tick(); setInterval(tick, 1000); }
  return { init };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MÓDULO: Nav — roteamento de páginas
───────────────────────────────────────── */
const Nav = (() => {
  let _current = 'dashboard';

  function render() {
    const navEl = document.getElementById('main-nav');
    navEl.innerHTML = DATA.nav.map(n => `
      <div class="nav-item${n.id === _current ? ' active' : ''}" data-page="${n.id}" onclick="Nav.go('${n.id}', this)">
        <span class="nav-icon">${n.icon}</span>
        <span class="nav-label">${n.label}</span>
        ${n.badge ? `<span class="nav-badge">${n.badge}</span>` : ''}
      </div>`).join('');
  }

  function go(page, el) {
    // deactivate all
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.bottom-nav-item').forEach(n => n.classList.remove('active'));

    // activate target
    document.getElementById('page-' + page).classList.add('active');
    if (el) el.classList.add('active');
    document.querySelectorAll(`.bottom-nav-item[data-page="${page}"]`).forEach(n => n.classList.add('active'));

    // update topbar
    const [t, s] = DATA.pageTitles[page] || ['—', ''];
    document.getElementById('page-title').textContent = t;
    document.getElementById('page-sub').textContent = s;
    document.querySelector('.content').scrollTop = 0;
    _current = page;
  }

  return { render, go };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MÓDULO: Sidebar — colapso
───────────────────────────────────────── */
const Sidebar = (() => {
  let _collapsed = false;
  function toggle() {
    _collapsed = !_collapsed;
    document.getElementById('sidebar').classList.toggle('collapsed', _collapsed);
    document.getElementById('collapse-btn').textContent = _collapsed ? '▶' : '◀';
  }
  return { toggle };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MÓDULO: Pages — renderização das páginas
───────────────────────────────────────── */
const Pages = (() => {

  /* helpers */
  function metricCard(m) {
    return `<div class="metric-card ${m.color}">
      <div class="metric-header"><div class="metric-label">${m.label}</div>${m.icon?`<div class="metric-icon">${m.icon}</div>`:''}</div>
      <div class="metric-value">${m.value}</div>
      ${m.subs.map(s=>`<div class="metric-sub">${s}</div>`).join('')}
    </div>`;
  }

  function barChart() {
    const bars = DATA.barChart;
    const groups = bars.labels.map((l, i) =>
      `<div class="bar-group">
        <div class="bar total" style="height:${bars.total[i]}%"></div>
        <div class="bar resolved" style="height:${bars.resolved[i]}%"></div>
      </div>`).join('');
    const labels = bars.labels.map(l => `<div class="bar-label">${l}</div>`).join('');
    return `<div class="bar-chart">${groups}</div>
      <div class="bar-labels">${labels}</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent);opacity:0.5"></div> Total</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green);opacity:0.7"></div> Resolvidas</div>
      </div>`;
  }

  function donutChart() {
    const d = DATA.donut;
    const circles = d.segments.map(s =>
      `<circle cx="18" cy="18" r="15.9" fill="none" stroke="${s.color}" stroke-width="3.5"
        stroke-dasharray="${s.dash}" stroke-dashoffset="${s.offset}"/>`).join('');
    const items = d.segments.map(s =>
      `<div class="donut-row">
        <div class="donut-row-dot" style="background:${s.color}"></div>
        <div class="donut-row-label">${s.label}</div>
        <div class="donut-row-val">${s.val}</div>
      </div>`).join('');
    return `<div class="donut-wrap">
      <div class="donut">
        <svg viewBox="0 0 36 36" width="100" height="100">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#1e2430" stroke-width="3.5"/>
          ${circles}
        </svg>
        <div class="donut-label"><span>${d.total}</span><small>total</small></div>
      </div>
      <div class="donut-items">${items}</div>
    </div>`;
  }

  function occList(items) {
    return items.map(o => `
      <div class="occurrence-item" onclick="Modal.open('occ-detail')">
        <div class="occ-header">
          <div class="occ-title">${o.title}</div>
          <span class="occ-badge ${o.badgeClass}">${o.badge}</span>
        </div>
        <div class="occ-desc">${o.desc}</div>
        <div class="occ-meta">${o.meta}</div>
      </div>`).join('');
  }

  function postosWidget(items) {
    return items.map(p => `
      <div class="post-item">
        <div class="post-info">
          <div class="post-name">${p.name}</div>
          <div class="post-region">${p.region}</div>
        </div>
        <div class="post-coverage ${p.covClass}">${p.cov}</div>
      </div>`).join('');
  }

  function typeBars() {
    const items = DATA.typeBars;
    const half = Math.ceil(items.length / 2);
    const col1 = items.slice(0, half);
    const col2 = items.slice(half);
    function row(t) {
      return `<div class="type-row">
        <div class="type-label"><span class="type-name">${t.name}</span><span class="type-count">${t.count}</span></div>
        <div class="type-track"><div class="type-fill" style="width:${t.pct};background:${t.color}"></div></div>
      </div>`;
    }
    return `<div class="type-list" style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px">
      <div>${col1.map(row).join('')}</div><div>${col2.map(row).join('')}</div>
    </div>`;
  }

  /* ── PAGE: Dashboard ── */
  function dashboard() {
    return `
    <div class="section-header">
      <div>
        <div class="section-title">Central de Operações</div>
        <div class="section-sub">Visão geral do turno atual — 27 de fevereiro de 2026</div>
      </div>
      <button class="btn btn-ghost">Operações em tempo real</button>
    </div>

    <div class="metrics-grid">${DATA.metrics.map(metricCard).join('')}</div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-header">
          <div><div class="panel-title">Ocorrências — Últimos 6 Meses</div><div class="panel-sub">Total registradas vs. resolvidas</div></div>
        </div>
        <div class="panel-body">${barChart()}</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div><div class="panel-title">Efetivo por Status</div><div class="panel-sub">Distribuição atual</div></div>
        </div>
        <div class="panel-body">${donutChart()}</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Ocorrências Recentes</div>
          <a class="panel-link" onclick="Nav.go('ocorrencias', document.querySelector('[data-page=ocorrencias].nav-item'))">Ver todas →</a>
        </div>
        <div class="panel-body">${occList(DATA.ocorrencias)}</div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Status dos Postos</div>
          <a class="panel-link" onclick="Nav.go('postos', document.querySelector('[data-page=postos].nav-item'))">Ver todos →</a>
        </div>
        <div class="panel-body">${postosWidget(DATA.postosWidget)}</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div><div class="panel-title">Ocorrências por Tipo</div><div class="panel-sub">Acumulado do mês</div></div>
      </div>
      <div class="panel-body">${typeBars()}</div>
    </div>`;
  }

  /* ── PAGE: Efetivo ── */
  function efetivo() {
    const rows = DATA.efetivo.map(e => `
      <tr>
        <td>${e.nome}</td><td>${e.mat}</td><td>${e.posto}</td><td>${e.turno}</td>
        <td><span class="status-pill" style="${e.pillStyle}">${e.status}</span></td>
        <td><button class="btn-sm" onclick="Modal.open('agent-detail')">Ver</button></td>
      </tr>`).join('');
    return `
    <div class="section-header">
      <div><div class="section-title">Efetivo</div><div class="section-sub">Gestão de vigilantes e colaboradores</div></div>
      <button class="btn btn-primary" onclick="Modal.open('new-agent')">+ Novo Vigilante</button>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Lista do Efetivo</div>
        <div style="display:flex;gap:8px">
          <input style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text);width:180px;outline:none" placeholder="Buscar vigilante...">
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nome</th><th>Matrícula</th><th>Posto</th><th>Turno</th><th>Status</th><th>Ações</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  /* ── PAGE: Postos ── */
  function postos() {
    const rows = DATA.postos.map(p => `
      <tr>
        <td>${p.posto}</td><td>${p.regiao}</td><td>${p.cob}</td><td>${p.vigs}</td>
        <td><span class="status-pill" style="${p.pillStyle}">${p.status}</span></td>
        <td><button class="btn-sm" onclick="Modal.open('posto-detail')">Detalhes</button></td>
      </tr>`).join('');
    return `
    <div class="section-header">
      <div><div class="section-title">Postos</div><div class="section-sub">Mapa de cobertura e status em tempo real</div></div>
      <button class="btn btn-primary" onclick="Modal.open('new-posto')">+ Novo Posto</button>
    </div>
    <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
      <div class="metric-card green"><div class="metric-header"><div class="metric-label">Cobertura Total</div></div><div class="metric-value">85%</div><div class="metric-sub">das vagas preenchidas</div></div>
      <div class="metric-card yellow"><div class="metric-header"><div class="metric-label">Postos Parciais</div></div><div class="metric-value">2</div><div class="metric-sub">aguardando cobertura</div></div>
      <div class="metric-card blue"><div class="metric-header"><div class="metric-label">Total Postos</div></div><div class="metric-value">9</div><div class="metric-sub">ativos no sistema</div></div>
    </div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Todos os Postos</div></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Posto</th><th>Região</th><th>Cobertura</th><th>Vigilantes</th><th>Status</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  /* ── PAGE: Ocorrências ── */
  function ocorrencias() {
    const rows = DATA.ocorrenciasTable.map(o => `
      <tr>
        <td style="color:var(--text2);font-family:'IBM Plex Mono',monospace;font-size:10px">${o.id}</td>
        <td>${o.tipo}</td><td>${o.local}</td><td>${o.hora}</td><td>${o.resp}</td>
        <td><span class="status-pill" style="${o.pillStyle}">${o.status}</span></td>
        <td><button class="btn-sm" onclick="Modal.open('occ-detail')">Ver</button></td>
      </tr>`).join('');
    return `
    <div class="section-header">
      <div><div class="section-title">Ocorrências</div><div class="section-sub">Registro e acompanhamento de ocorrências</div></div>
      <button class="btn btn-primary" onclick="Modal.open('new-occ')">+ Nova Ocorrência</button>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Ocorrências — Fev 2026</div>
        <div style="display:flex;gap:8px">
          <select style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text);outline:none">
            <option>Todos os tipos</option><option>Suspeito</option><option>Invasão</option><option>Furto</option><option>Vandalismo</option>
          </select>
          <select style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--text);outline:none">
            <option>Todos os status</option><option>Em andamento</option><option>Resolvida</option><option>Encaminhada</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Tipo</th><th>Local</th><th>Hora</th><th>Responsável</th><th>Status</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  /* ── PAGE: Rondas ── */
  function rondas() {
    const cards = DATA.rondas.map(r => `
      <div class="ronda-card ${r.cardClass}">
        <div class="ronda-name">${r.nome}</div>
        <div class="ronda-time">${r.time}</div>
        <div class="ronda-status ${r.statusClass}">${r.statusLabel}</div>
      </div>`).join('');
    const addCard = `<div class="ronda-card" style="opacity:0.4;border-style:dashed;cursor:default">
      <div class="ronda-name" style="color:var(--text2)">+ Adicionar ronda</div>
      <div class="ronda-time" onclick="Modal.open('new-ronda')" style="cursor:pointer;color:var(--accent)">Programar nova →</div>
    </div>`;
    const metrics = DATA.rondaMetrics.map(m => `
      <div class="metric-card ${m.color}">
        <div class="metric-header"><div class="metric-label">${m.label}</div></div>
        <div class="metric-value">${m.value}</div>
        <div class="metric-sub">${m.sub}</div>
      </div>`).join('');
    return `
    <div class="section-header">
      <div><div class="section-title">Rondas</div><div class="section-sub">Controle de rondas programadas e realizadas</div></div>
      <button class="btn btn-primary" onclick="Modal.open('new-ronda')">+ Nova Ronda</button>
    </div>
    <div class="metrics-grid" style="grid-template-columns:repeat(4,1fr)">${metrics}</div>
    <div class="ronda-grid">${cards}${addCard}</div>`;
  }

  /* ── PAGE: Escalas ── */
  function escalas() {
    const days = DATA.escalas.map(d => `
      <div class="scale-day${d.today?' today':''}">
        <div class="scale-day-name">${d.dia}</div>
        <div class="scale-day-num">${d.num}</div>
        <div class="scale-agents">${d.agents.map(a=>`<div class="scale-agent">${a}</div>`).join('')}</div>
      </div>`).join('');
    return `
    <div class="section-header">
      <div><div class="section-title">Escalas</div><div class="section-sub">Março 2026</div></div>
      <button class="btn btn-primary" onclick="Modal.open('new-escala')">+ Nova Escala</button>
    </div>
    <div class="scale-grid">${days}</div>`;
  }

  /* ── PAGE: Relatórios ── */
  function relatorios() {
    const cards = DATA.relatorios.map(r => `
      <div class="panel" style="cursor:pointer" onclick="Toast.show('${r.toast}', 'Relatórios')">
        <div class="panel-body" style="text-align:center;padding:28px">
          <div style="font-size:32px;margin-bottom:12px">${r.icon}</div>
          <div class="panel-title" style="margin-bottom:6px">${r.title}</div>
          <div class="panel-sub">${r.sub}</div>
        </div>
      </div>`).join('');
    return `
    <div class="section-header">
      <div><div class="section-title">Relatórios</div><div class="section-sub">Exportação e análise de dados operacionais</div></div>
      <button class="btn btn-primary" onclick="Toast.show('📄 Relatório gerado com sucesso!', 'Exportação')">Exportar PDF</button>
    </div>
    <div class="grid-3">${cards}</div>`;
  }

  /* ── render all pages into DOM ── */
  function render() {
    const renderers = { dashboard, efetivo, postos, ocorrencias, rondas, escalas, relatorios };
    const content = document.getElementById('content');
    content.innerHTML = DATA.nav.map(n => `
      <div class="page${n.id==='dashboard'?' active':''}" id="page-${n.id}">
        ${renderers[n.id] ? renderers[n.id]() : ''}
      </div>`).join('');
  }

  return { render };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MÓDULO: BottomNav — navegação mobile
───────────────────────────────────────── */
const BottomNav = (() => {
  const items = [
    { id: 'dashboard',   icon: '⬡', label: 'Home' },

    { id: 'relatorios',  icon: '📊', label: 'Mais' },

  function render() {
    document.getElementById('bottom-nav').innerHTML = items.map((it, i) => `
      <div class="bottom-nav-item${i===0?' active':''}" data-page="${it.id}"
           onclick="Nav.go('${it.id}', document.querySelector('[data-page=${it.id}].nav-item'))">
        <span class="bnav-icon">${it.icon}</span>
        <span class="bnav-label">${it.label}</span>
      </div>`).join('');
  }

  return { render };
})();
</script>

<script>
/* ─────────────────────────────────────────
   MÓDULO: Init — bootstrapper
───────────────────────────────────────── */
(function init() {
  Pages.render();       // 1. renderiza páginas
  Nav.render();         // 2. renderiza sidebar nav
  Modal.render();       // 3. injeta modais
  BottomNav.render();   // 4. renderiza bottom nav mobile
  Clock.init();         // 5. inicia relógio
})();
</script>
